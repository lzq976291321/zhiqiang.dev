<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-labelledby="title desc">
  <title id="title">Fictional supercar beast awakening commercial</title>
  <desc id="desc">A black horn silhouette transitions into a blade-like fictional supercar with cold highlights and amber heat reflections.</desc>
  <defs>
    <linearGradient id="dark" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#030508"/>
      <stop offset=".45" stop-color="#111827"/>
      <stop offset="1" stop-color="#050607"/>
    </linearGradient>
    <radialGradient id="heat" cx="54%" cy="54%" r="46%">
      <stop offset="0" stop-color="#ff9a32" stop-opacity=".52"/>
      <stop offset=".35" stop-color="#9fe8ff" stop-opacity=".24"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="750" fill="url(#dark)"/>
  <rect width="1200" height="750" fill="url(#heat)"/>
  <g filter="url(#glow)" opacity=".9">
    <path d="M238 260C390 157 512 186 603 321" fill="none" stroke="#e7faff" stroke-opacity=".55" stroke-width="7" stroke-linecap="round"/>
