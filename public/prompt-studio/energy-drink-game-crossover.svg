<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-labelledby="title desc">
  <title id="title">Energy drink and arcade game crossover poster</title>
  <desc id="desc">A fictional energy drink can launches from a glowing arcade portal with sparks and speed trails.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#070b16"/>
      <stop offset=".52" stop-color="#10243c"/>
      <stop offset="1" stop-color="#070b16"/>
    </linearGradient>
    <radialGradient id="portal" cx="50%" cy="46%" r="38%">
      <stop offset="0" stop-color="#fff8b0" stop-opacity=".82"/>
      <stop offset=".34" stop-color="#00e0ff" stop-opacity=".58"/>
      <stop offset=".68" stop-color="#ff7a1a" stop-opacity=".32"/>
      <stop offset="1" stop-color="#070b16" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="can" x1="0" x2="1">
      <stop offset="0" stop-color="#0b1224"/>
      <stop offset=".27" stop-color="#30e6ff"/>
      <stop offset=".48" stop-color="#effbff"/>
      <stop offset=".75" stop-color="#ff7a1a"/>
      <stop offset="1" stop-color="#14101a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="750" fill="url(#bg)"/>
  <rect width="1200" height="750" fill="url(#portal)"/>
  <g opacity=".26" stroke="#9fe8ff" stroke-width="1">
    <path d="M0 600h1200M0 540h1200M0 480h1200M0 420h1200"/>
    <path d="M160 750 520 70M360 750 560 70M840 750 640 70M1040 750 680 70"/>
  </g>
  <g filter="url(#glow)" fill="none" stroke-linecap="round">
    <path d="M212 580C405 405 676 350 998 172" stroke="#00d9ff" stroke-width="7" opacity=".72"/>
    <path d="M170 225C404 330 700 358 1028 545" stroke="#ff7a1a" stroke-width="8" opacity=".68"/>
    <path d="M254 452C480 518 720 486 946 386" stroke="#fff1a3" stroke-width="3" opacity=".75"/>
  </g>
  <g transform="translate(0 -12)">
    <ellipse cx="600" cy="590" rx="156" ry="42" fill="#000" opacity=".45"/>
    <path d="M485 214c0-38 230-38 230 0v344c0 45-230 45-230 0V214Z" fill="url(#can)" stroke="#eaffff" stroke-opacity=".36" stroke-width="3"/>
    <ellipse cx="600" cy="214" rx="115" ry="34" fill="#f5fdff" opacity=".92"/>
    <ellipse cx="600" cy="219" rx="82" ry="18" fill="#101827" opacity=".56"/>
    <rect x="525" y="320" width="150" height="116" rx="18" fill="#07111f" opacity=".62" stroke="#ffffff" stroke-opacity=".22"/>
    <path d="M546 405 604 330 655 405H546Z" fill="#9ff6ff" opacity=".8"/>
    <circle cx="548" cy="282" r="5" fill="#fff"/>
    <circle cx="665" cy="278" r="4" fill="#fff"/>
    <path d="M522 548c50 24 108 27 165 2" fill="none" stroke="#fff" stroke-opacity=".52" stroke-width="4" stroke-linecap="round"/>
  </g>
  <g fill="#fff" opacity=".7">
    <circle cx="277" cy="230" r="7"/>
    <rect x="292" y="250" width="24" height="8" rx="4" transform="rotate(25 292 250)"/>
    <circle cx="884" cy="188" r="5"/>
    <path d="M930 242h38v10h-38zM944 228h10v38h-10z" fill="#ffb45a"/>
    <circle cx="912" cy="530" r="7" fill="#9fe8ff"/>
    <rect x="234" y="514" width="34" height="10" rx="5" fill="#ff7a1a"/>
  </g>
  <rect x="34" y="34" width="1132" height="682" rx="36" fill="none" stroke="#ffffff" stroke-opacity=".08"/>
</svg>
