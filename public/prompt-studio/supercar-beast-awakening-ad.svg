    <circle cx="600" cy="334" r="15" fill="#ff8a24"/>
  </g>
  <g opacity=".56" stroke-linecap="round" filter="url(#glow)">
    <path d="M138 512C354 442 646 423 1058 468" stroke="#9fe8ff" stroke-width="5"/>
    <path d="M184 576C420 532 692 516 1012 550" stroke="#ff8a24" stroke-width="7"/>
    <path d="M98 370C362 438 658 434 1096 350" stroke="#ffffff" stroke-opacity=".25" stroke-width="3"/>
  </g>
  <g transform="translate(0 18)">
    <path d="M210 495c80-78 169-127 306-142l187-19c62-6 106 8 154 43l119 86c15 11 11 35-8 40-231 60-493 63-786 17-20-3-27-20-12-25Z" fill="#080b10" stroke="#e9fbff" stroke-opacity=".24" stroke-width="3"/>
