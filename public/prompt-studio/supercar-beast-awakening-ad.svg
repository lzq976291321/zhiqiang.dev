    <circle cx="826" cy="510" r="64" fill="#030405" stroke="#dff8ff" stroke-opacity=".42" stroke-width="7"/>
    <circle cx="372" cy="520" r="22" fill="#111a24"/>
    <circle cx="826" cy="510" r="26" fill="#111a24"/>
  </g>
  <g fill="#ffffff" opacity=".28">
